name: Tests

on:
  - push

jobs:
  os-python-matrix:
    strategy:
      matrix:
        os:
          - name: macos
            icon: 🍏
          - name: ubuntu
            icon: 🐧
          - name: windows
            icon: 🪟
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'

    runs-on: ${{ matrix.os.name }}-latest
    name: ${{ matrix.os.icon }} Python ${{ matrix.python-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@master

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@master
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install h5dump on Linux
        if: ${{ runner.os == 'Linux' }}
        run: sudo apt install hdf5-tools

      - name: Install h5dump on macOS
        if: ${{ runner.os == 'macOS' }}
        run: brew install hdf5

      - name: Check and test code
        run: just test
